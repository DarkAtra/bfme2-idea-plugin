<svg width="128" height="128" viewBox="80 80 360 360" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="gold" cx="35%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#fff7cc"/>
            <stop offset="30%" stop-color="#f2d67a"/>
            <stop offset="60%" stop-color="#d4af37"/>
            <stop offset="85%" stop-color="#9c7420"/>
            <stop offset="100%" stop-color="#5e4310"/>
        </radialGradient>

        <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.2" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#fff" flood-opacity="1"/>
        </filter>
    </defs>

    <circle cx="256" cy="256" r="150"
            fill="none"
            stroke="url(#gold)"
            stroke-width="34"
            filter="url(#softGlow)"/>

    <circle cx="256" cy="250" r="150"
            fill="none"
            stroke="#fff2b0"
            stroke-width="10"
            opacity="0.28"/>

    <circle cx="256" cy="262" r="150"
            fill="none"
            stroke="#3a2a0c"
            stroke-width="12"
            opacity="0.25"
            filter="url(#glow)"/>
</svg>
